<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Card Hearts</title>
		<link rel="icon" type="image/png" href="assets/heart-icon.png" />
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main class="app-shell">
			<header class="top-bar">
				<img class="app-icon" src="assets/heart-icon.png" alt="" />
				<span class="title">Card Hearts</span>
				<button class="fullscreen-toggle" type="button" aria-label="Enter fullscreen" title="Enter fullscreen">⛶</button>
			</header>

			<section class="stage-wrap">
				<canvas id="gameCanvas" aria-label="Hearts game canvas"></canvas>
				<div class="game-over-controls" hidden>
					<button class="overlay-action-button play-again-button" type="button">Play Again?</button>
				</div>
			</section>

			<footer class="status-bar"><p></p></footer>
		</main>

		<script src="characters.js"></script>
		<script src="deck-info.js"></script>
		<script src="character-info.js"></script>
		<script src="animation.js"></script>
		<script src="game-logic.js"></script>
	</body>
</html>
